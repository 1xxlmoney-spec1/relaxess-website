# Cloudflare Pages configuration
# This file configures the build and deployment settings for Cloudflare Pages

name = "calmspace"
type = "javascript"
account_id = ""  # Add your Cloudflare account ID
workers_dev = true
route = ""
zone_id = ""  # Add your Cloudflare zone ID

# Build settings
[env.production]
name = "calmspace"
routes = [
  { pattern = "calmspace.app", zone_name = "calmspace.app" }
]

# Environment variables (if needed)
[env.production.vars]
ENVIRONMENT = "production"
API_URL = "https://api.calmspace.app"

# Triggers (optional)
[triggers]
crons = []
